<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ESP32 Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
    }

    h1 {
      font-size: 1.5rem;
      color: #90caf9;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 0.8rem;
      color: #555;
      margin-bottom: 30px;
    }

    /* ---- Main menu cards ---- */
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      width: 100%;
      max-width: 600px;
      margin-bottom: 30px;
    }

    .menu-card {
      background: #1e2130;
      border: 2px solid #2a2f45;
      border-radius: 14px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
    }

    .menu-card:hover  { border-color: #90caf9; background: #252840; }
    .menu-card.active { border-color: #42a5f5; background: #1a3a5c; }

    .menu-card .icon  { font-size: 2rem; margin-bottom: 8px; }
    .menu-card .label { font-size: 0.85rem; color: #888; margin-bottom: 6px; }
    .menu-card .value {
      font-size: 1.8rem;
      font-weight: 700;
      color: #42a5f5;
    }
    .menu-card .unit  { font-size: 1rem; color: #666; margin-left: 2px; }
    .menu-card .age   { font-size: 0.7rem; color: #444; margin-top: 6px; }

    /* Color per sensor */
    .card-t1      { border-color: #2a2f45; }
    .card-t1.active, .card-t1:hover { border-color: #ef5350; }
    .card-t1 .value { color: #ef5350; }

    .card-t2      { border-color: #2a2f45; }
    .card-t2.active, .card-t2:hover { border-color: #ff7043; }
    .card-t2 .value { color: #ff7043; }

    .card-voltage { border-color: #2a2f45; }
    .card-voltage.active, .card-voltage:hover { border-color: #66bb6a; }
    .card-voltage .value { color: #66bb6a; }

    .card-current { border-color: #2a2f45; }
    .card-current.active, .card-current:hover { border-color: #ffa726; }
    .card-current .value { color: #ffa726; }

    /* ---- Detail panel ---- */
    .panel {
      display: none;
      flex-direction: column;
      align-items: center;
      background: #1e2130;
      border: 1px solid #2a2f45;
      border-radius: 16px;
      padding: 36px 50px;
      min-width: 320px;
      width: 100%;
      max-width: 500px;
      animation: fadeIn 0.25s ease;
    }

    .panel.visible { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .panel-icon    { font-size: 2.5rem; margin-bottom: 10px; }
    .panel-label   { font-size: 0.9rem; color: #888; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }
    .panel-value   { font-size: 5rem; font-weight: 700; line-height: 1; }
    .panel-unit    { font-size: 2rem; color: #888; margin-left: 4px; }

    .panel-extra {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #666;
      text-align: center;
      line-height: 1.8;
    }

    .status-row {
      display: flex;
      align-items: center;
      margin-top: 16px;
      font-size: 0.78rem;
      color: #555;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 8px;
      background: #4caf50;
      animation: pulse 2s infinite;
    }
    .dot.stale { background: #f44336; animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .back-btn {
      margin-top: 28px;
      background: transparent;
      border: 1px solid #333;
      color: #777;
      padding: 8px 28px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .back-btn:hover { border-color: #90caf9; color: #90caf9; }

    /* Connection status bar */
    .status-bar {
      font-size: 0.75rem;
      color: #444;
      margin-bottom: 20px;
    }
    .status-bar span { color: #4caf50; }
    .status-bar span.err { color: #f44336; }
  </style>
</head>
<body>

  <h1>⚙ ESP32 System Monitor</h1>
  <p class="subtitle">Live sensor dashboard — updates every 3s</p>
  <div class="status-bar">Backend: <span id="connStatus">connecting...</span></div>

  <!-- 2×2 Menu Grid -->
  <div class="menu-grid" id="menuGrid">

    <div class="menu-card card-t1" onclick="openPanel('t1', this)">
      <div class="icon">🌡</div>
      <div class="label">Sensor 1 Temp</div>
      <div><span class="value" id="card-t1">--</span><span class="unit">°C</span></div>
      <div class="age" id="age-t1">No data</div>
    </div>

    <div class="menu-card card-t2" onclick="openPanel('t2', this)">
      <div class="icon">🌡</div>
      <div class="label">Sensor 2 Temp</div>
      <div><span class="value" id="card-t2">--</span><span class="unit">°C</span></div>
      <div class="age" id="age-t2">No data</div>
    </div>

    <div class="menu-card card-voltage" onclick="openPanel('voltage', this)">
      <div class="icon">⚡</div>
      <div class="label">Buck Output</div>
      <div><span class="value" id="card-voltage">--</span><span class="unit">V</span></div>
      <div class="age" id="age-voltage">No data</div>
    </div>

    <div class="menu-card card-current" onclick="openPanel('current', this)">
      <div class="icon">🔌</div>
      <div class="label">Current</div>
      <div><span class="value" id="card-current">--</span><span class="unit">A</span></div>
      <div class="age" id="age-current">No data</div>
    </div>

  </div>

  <!-- Detail Panel -->
  <div class="panel" id="detailPanel">
    <div class="panel-icon"  id="panelIcon">🌡</div>
    <div class="panel-label" id="panelLabel">SENSOR 1</div>
    <div>
      <span class="panel-value" id="panelValue" style="color:#42a5f5">--</span>
      <span class="panel-unit"  id="panelUnit">°C</span>
    </div>
    <div class="panel-extra" id="panelExtra"></div>
    <div class="status-row">
      <div class="dot" id="panelDot"></div>
      <span id="panelTime">Waiting...</span>
    </div>
    <button class="back-btn" onclick="closePanel()">← Back to Dashboard</button>
  </div>

  <script>
    const API_BASE = "https://ntc-backend-basr.onrender.com";

    // Sensor config
    const SENSORS = {
      t1:      { label: "SENSOR 1 TEMP",   icon: "🌡", unit: "°C", color: "#ef5350", decimals: 1, extra: null },
      t2:      { label: "SENSOR 2 TEMP",   icon: "🌡", unit: "°C", color: "#ff7043", decimals: 1, extra: null },
      voltage: { label: "BUCK OUTPUT",     icon: "⚡", unit: "V",  color: "#66bb6a", decimals: 3, extra: "power" },
      current: { label: "CURRENT SENSOR",  icon: "🔌", unit: "A",  color: "#ffa726", decimals: 3, extra: "power" }
    };

    let currentSensor = null;
    let pollInterval  = null;
    let allData       = {};

    // ---- Fetch ALL data at once (efficient) ----
    async function fetchAll() {
      try {
        const res  = await fetch(`${API_BASE}/data`);
        allData    = await res.json();

        document.getElementById("connStatus").textContent = "connected ✓";
        document.getElementById("connStatus").className   = "";

        // Update all cards
        ["t1", "t2", "voltage", "current"].forEach(key => {
          const d = allData[key];
          if (!d || d.value === null) return;

          const cfg = SENSORS[key];
          document.getElementById(`card-${key}`).textContent =
            parseFloat(d.value).toFixed(cfg.decimals);

          const age = (Date.now() - new Date(d.updatedAt)) / 1000;
          document.getElementById(`age-${key}`).textContent =
            age < 60
              ? `${Math.round(age)}s ago`
              : `${Math.round(age/60)}m ago`;
        });

        // If detail panel is open, refresh it too
        if (currentSensor) updatePanel();

      } catch (err) {
        document.getElementById("connStatus").textContent = "disconnected ✗";
        document.getElementById("connStatus").className   = "err";
      }
    }

    // ---- Update the open detail panel ----
    function updatePanel() {
      const d = allData[currentSensor];
      if (!d || d.value === null) return;

      const cfg = SENSORS[currentSensor];
      document.getElementById("panelValue").textContent =
        parseFloat(d.value).toFixed(cfg.decimals);

      // Extra info (power = V × I)
      if (cfg.extra === "power" && allData.voltage && allData.current) {
        const v = allData.voltage.value;
        const i = allData.current.value;
        if (v !== null && i !== null) {
          const power = (v * Math.abs(i)).toFixed(2);
          document.getElementById("panelExtra").innerHTML =
            `Power: <strong style="color:#fff">${power} W</strong>
             &nbsp;|&nbsp; V=${parseFloat(v).toFixed(3)}V
             &nbsp;|&nbsp; I=${parseFloat(i).toFixed(3)}A`;
        }
      }

      const age = (Date.now() - new Date(d.updatedAt)) / 1000;
      const dot = document.getElementById("panelDot");
      dot.className = age > 15 ? "dot stale" : "dot";
      document.getElementById("panelTime").textContent =
        `Last update: ${new Date(d.updatedAt).toLocaleTimeString()}`;
    }

    // ---- Open detail panel ----
    function openPanel(sensor, card) {
      currentSensor = sensor;
      const cfg = SENSORS[sensor];

      // Highlight card
      document.querySelectorAll(".menu-card").forEach(c => c.classList.remove("active"));
      card.classList.add("active");

      // Configure panel
      document.getElementById("panelIcon").textContent  = cfg.icon;
      document.getElementById("panelLabel").textContent = cfg.label;
      document.getElementById("panelUnit").textContent  = cfg.unit;
      document.getElementById("panelValue").style.color = cfg.color;
      document.getElementById("panelValue").textContent = "--";
      document.getElementById("panelExtra").textContent = "";
      document.getElementById("panelTime").textContent  = "Loading...";

      document.getElementById("detailPanel").classList.add("visible");
      updatePanel(); // immediate update from cached data
    }

    // ---- Close detail panel ----
    function closePanel() {
      currentSensor = null;
      document.getElementById("detailPanel").classList.remove("visible");
      document.querySelectorAll(".menu-card").forEach(c => c.classList.remove("active"));
    }

    // ---- Start polling ----
    fetchAll();
    pollInterval = setInterval(fetchAll, 3000);
  </script>
</body>
</html>
